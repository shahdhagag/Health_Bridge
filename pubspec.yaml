name: health_and_doctor_appointment
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_spinkit: ^5.2.0
  dio: ^5.4.3+1
  google_fonts: ^6.2.1
  url_launcher: ^6.2.6
  intl: ^0.19.0

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  flutter_tabler_icons: ^1.43.0
  cloud_firestore: ^6.2.0
  provider: ^6.1.5+1
  cool_alert: ^2.0.1
  google_sign_in: ^5.4.0
  flutter_facebook_auth: ^6.2.0
  google_nav_bar: ^5.0.6
  font_awesome_flutter: ^11.0.0
  carousel_slider: ^5.1.2
  quick_actions: ^1.0.0
  introduction_screen: ^3.1.12
  flutter_launcher_icons: ^0.14.4
  flutter_screenutil: ^5.9.3
  image_picker: ^1.1.2
  firebase_storage: ^13.2.0
  shared_preferences: ^2.5.5

dev_dependencies:
